<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bag { fill: #1e293b; } /* Slate 800 */
      .handle { fill: none; stroke: #1e293b; stroke-width: 5; stroke-linecap: round; }
      .shoe { fill: #000000; stroke: #ffffff; stroke-width: 2.5; stroke-linejoin: round; }
    </style>
  </defs>
  
  <!-- Shopping Bag -->
  <rect x="35" y="25" width="40" height="45" rx="3" class="bag" />
  <path d="M45 25 V 15 C 45 8, 65 8, 65 15 V 25" class="handle" />
  
  <!-- High Heel -->
  <path d="M 25 35
           C 32 35, 38 45, 42 60
           C 50 75, 70 78, 85 82
           C 80 88, 60 88, 45 78
           C 40 75, 36 82, 34 95
           C 31 95, 33 80, 32 70
           C 25 55, 18 45, 25 35 Z" class="shoe" />
</svg>